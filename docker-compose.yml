services:
  mysql:
    image: mysql:8.4
    container_name: ai-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ai_agent_root_password
      MYSQL_DATABASE: ai_agent_dev
      MYSQL_USER: ai_agent
      MYSQL_PASSWORD: ai_agent_password
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ai_agent_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: ai-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ai_agent_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ai_agent_mysql_data:
  ai_agent_redis_data:
